<div id="codigos-page" class="page hidden">
<div class="bg-white shadow-md rounded-lg mb-6 p-6">
<div class="flex flex-wrap justify-between items-center mb-6">
<h2 class="text-2xl font-bold text-gray-800">Gestión de Códigos Promocionales</h2>
<div class="flex space-x-2 mt-4 md:mt-0" id="export-buttons-codigos">
<button class="btn-export bg-green-500 hover:bg-green-600 text-white py-2 px-3 rounded-lg transition-colors flex items-center gap-2" data-table-id="codigos-table-body" data-type="xlsx" title="Exportar a Excel"><i class="fas fa-file-excel"></i></button>
<button class="btn-export bg-red-500 hover:bg-red-600 text-white py-2 px-3 rounded-lg transition-colors flex items-center gap-2" data-table-id="codigos-table-body" data-type="pdf" title="Exportar a PDF"><i class="fas fa-file-pdf"></i></button>
<button class="btn-print bg-gray-500 hover:bg-gray-600 text-white py-2 px-3 rounded-lg transition-colors flex items-center gap-2" data-table-id="codigos-table-body" title="Imprimir"><i class="fas fa-print"></i></button>
<button id="btn-add-codigo" class="bg-orange-600 hover:bg-orange-700 text-white py-2 px-4 rounded-lg transition-colors flex items-center gap-2">
<i class="fas fa-plus"></i> Nuevo Código
</button>
</div>
</div>
<div class="overflow-x-auto">
<table class="min-w-full bg-white border border-gray-200">
<thead>
<tr>
<th class="py-3 px-4 bg-gray-100 text-left text-xs font-medium text-gray-600 uppercase tracking-wider">ID Código</th>
<th class="py-3 px-4 bg-gray-100 text-left text-xs font-medium text-gray-600 uppercase tracking-wider">Código Descuento</th>
<th class="py-3 px-4 bg-gray-100 text-left text-xs font-medium text-gray-600 uppercase tracking-wider">% Descuento</th>
<th class="py-3 px-4 bg-gray-100 text-left text-xs font-medium text-gray-600 uppercase tracking-wider">Fecha Inicio</th>
<th class="py-3 px-4 bg-gray-100 text-left text-xs font-medium text-gray-600 uppercase tracking-wider">Fecha Fin</th>
<th class="py-3 px-4 bg-gray-100 text-left text-xs font-medium text-gray-600 uppercase tracking-wider">Estado</th>
<th class="py-3 px-4 bg-gray-100 text-left text-xs font-medium text-gray-600 uppercase tracking-wider">Descripción</th>
<th class="py-3 px-4 bg-gray-100 text-center text-xs font-medium text-gray-600 uppercase tracking-wider">Acciones</th>
</tr>
</thead>
<tbody id="codigos-table-body" class="divide-y divide-gray-200">
<!-- Los códigos se cargarán dinámicamente -->
</tbody>
</table>
</div>
</div>
</div>
