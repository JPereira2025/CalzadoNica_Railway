<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Subir imágenes</title>
  <link rel="stylesheet" href="/tienda/css/tienda.css">
</head>
<body>
  <main class="container">
    <h1>Panel Admin - Subir imagen de producto</h1>
    <div id="admin-msg" style="margin-bottom:1rem;color:var(--secondary);"></div>
    <form id="upload-form">
      <div class="form-group">
        <label>Producto</label>
        <select id="admin-producto" required></select>
      </div>
      <div class="form-group">
        <label>Imagen (archivo)</label>
        <input type="file" id="admin-imagen" accept="image/*" required>
      </div>
      <div class="form-group">
        <label><input type="checkbox" id="admin-principal"> Marcar como principal</label>
      </div>
      <div class="form-group">
        <label>Orden (opcional)</label>
        <input type="number" id="admin-orden" value="0">
      </div>
      <div class="form-group">
        <button class="btn-submit" id="btn-upload">Subir imagen</button>
      </div>
    </form>
    <div id="upload-result" style="margin-top:1rem"></div>
  </main>
  <script src="/tienda/js/tienda.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (window.tienda && window.tienda.initAdmin) window.tienda.initAdmin();
    });
  </script>
</body>
</html>
