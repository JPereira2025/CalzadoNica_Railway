<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrito - Calzado Nica</title>
  <link rel="stylesheet" href="/tienda/css/tienda.css">
</head>

<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-content">
      <a href="/tienda/" class="logo"><img src="img/calzado_nica_logo.png" alt="Calzado Nica" class="store-logo-small">Calzado Nica</a>
      <div class="nav-links">
        <a href="/tienda/">Tienda</a>
        <div class="cart-icon">
          🛒
          <span class="cart-count" id="cart-count">0</span>
        </div>
        <div class="auth-buttons" id="auth-buttons">
          <button class="btn-auth btn-login" onclick="abrirModal('login')">Ingresar</button>
          <button class="btn-auth btn-register" onclick="abrirModal('register')">Registrarse</button>
        </div>
        <div class="user-menu" id="user-menu" style="display:none;">
          <span class="user-name" id="user-name"></span>
          <button class="btn-logout" onclick="logout()">Salir</button>
        </div>
      </div>
    </div>
  </nav>

  <!-- Contenido Principal -->
  <main class="container">
    <div class="carrito-container" id="carrito-container">
      <div class="carrito-header">
        <h1>🛒 Carrito de Compras</h1>
        <span id="carrito-cantidad"></span>
      </div>

      <div id="carrito-items">
        <!-- Items del carrito se cargan aquí -->
      </div>

      <div class="carrito-vacio" id="carrito-vacio" style="display:none;">
        <div style="font-size: 4rem; margin-bottom: 1rem;">🛒</div>
        <h2>Tu carrito está vacío</h2>
        <p>Parece que aún no has agregado productos</p>
        <a href="/tienda/" class="btn-continuar-comprando" style="display: inline-block; margin-top: 1rem;">Ver
          Productos</a>
      </div>

      <div class="carrito-resumen" id="carrito-resumen" style="display:none;">
        <div id="codigo-descuento-section">
          <div class="form-group" style="max-width: 300px; margin-left: auto;">
            <label>¿Tienes un código de descuento?</label>
            <div style="display: flex; gap: 0.5rem;">
              <input type="text" id="codigo-descuento" placeholder="Ingresa el código">
              <button class="btn-auth btn-register" onclick="aplicarDescuento()"
                style="padding: 0.5rem 1rem;">Aplicar</button>
            </div>
              <p id="descuento-aplicado" style="color: var(--success); margin-top: 0.3rem; display:inline-block;"></p>
              <button id="quitar-descuento-btn" onclick="quitarDescuento()" style="display:none; margin-left:0.5rem; background:transparent; border:1px solid var(--success); color:var(--success); padding:0.2rem 0.5rem; border-radius:4px;">Quitar</button>
          </div>
        </div>

        <div style="text-align: right;">
          <p>Subtotal: <span id="subtotal">C$ 0.00</span></p>
          <p id="fila-descuento" style="display: none;">Descuento: <span id="monto-descuento"
              style="color: var(--success);">-C$ 0.00</span></p>
          <h3>Total: <span class="total" id="total">C$ 0.00</span></h3>
        </div>

        <div style="text-align: right;">
          <a href="/tienda/" class="btn-continuar-comprando" style="display: inline-block; background: var(--primary);">Seguir Comprando</a>
          <button class="btn-vaciar" onclick="vaciarCarrito()" style="margin-left:0.6rem; background: #e74c3c; color: white; border: none; padding: 0.6rem 1rem; border-radius:4px; cursor:pointer;">Vaciar Carrito</button>
          <button class="btn-proceder-pago" onclick="procederAlPago()" style="margin-left:0.6rem;">Proceder al Pago</button>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <p>&copy; 2024 Calzado Nica. Todos los derechos reservados.</p>
  </footer>

  <!-- Modal de Autenticación -->
  <div class="modal" id="auth-modal">
    <div class="modal-content">
      <button class="modal-close" onclick="cerrarModal()">&times;</button>
      <div class="modal-tabs">
        <div class="modal-tab active" data-tab="login" onclick="cambiarTab('login')">Iniciar Sesión</div>
        <div class="modal-tab" data-tab="register" onclick="cambiarTab('register')">Registrarse</div>
      </div>

      <form class="modal-form active" id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>Correo electrónico</label>
          <input type="email" name="email" required>
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" name="password" required>
        </div>
        <div class="error-message" id="login-error"></div>
        <button type="submit" class="btn-submit">Ingresar</button>
      </form>

      <form class="modal-form" id="register-form" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label>Correo electrónico</label>
          <input type="email" name="email" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Nombres</label>
            <input type="text" name="nombres" required>
          </div>
          <div class="form-group">
            <label>Apellidos</label>
            <input type="text" name="apellidos" required>
          </div>
        </div>
        <div class="form-group">
          <label>Teléfono</label>
          <input type="tel" name="telefono">
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" name="password" required minlength="6">
        </div>
        <div class="form-group">
          <label>Confirmar Contraseña</label>
          <input type="password" name="confirmPassword" required>
        </div>
        <div class="error-message" id="register-error"></div>
        <div class="success-message" id="register-success"></div>
        <button type="submit" class="btn-submit">Crear Cuenta</button>
      </form>
    </div>
  </div>

  <!-- Modal de confirmación reutilizable -->
  <div class="modal" id="confirm-modal">
    <div class="modal-content">
      <div id="confirm-message" style="margin-bottom:1rem; font-weight:600;"></div>
      <div style="display:flex; gap:0.5rem; justify-content:flex-end;">
        <button id="confirm-cancel" class="btn-submit" style="background:#6c757d;">Cancelar</button>
        <button id="confirm-ok" class="btn-submit" style="background:#e74c3c;">Confirmar</button>
      </div>
    </div>
  </div>

  <script src="/tienda/js/tienda.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      actualizarUIcarrito();
    });
  </script>
</body>

</html>
