<div id="estilos-page" class="page hidden">
<div class="bg-white shadow-md rounded-lg mb-6 p-6">
<div class="flex flex-wrap justify-between items-center mb-6">
<h2 class="text-2xl font-bold text-gray-800">Gestión de Estilos</h2>
<div class="flex space-x-2 mt-4 md:mt-0" id="export-buttons-estilos">
<button class="btn-export bg-green-500 hover:bg-green-600 text-white py-2 px-3 rounded-lg transition-colors flex items-center gap-2" data-table-id="estilos-table-body" data-type="xlsx" title="Exportar a Excel"><i class="fas fa-file-excel"></i></button>
<button class="btn-export bg-red-500 hover:bg-red-600 text-white py-2 px-3 rounded-lg transition-colors flex items-center gap-2" data-table-id="estilos-table-body" data-type="pdf" title="Exportar a PDF"><i class="fas fa-file-pdf"></i></button>
<button class="btn-print bg-gray-500 hover:bg-gray-600 text-white py-2 px-3 rounded-lg transition-colors flex items-center gap-2" data-table-id="estilos-table-body" title="Imprimir"><i class="fas fa-print"></i></button>
<button id="btn-add-estilo" class="bg-purple-600 hover:bg-purple-700 text-white py-2 px-4 rounded-lg transition-colors flex items-center gap-2">
<i class="fas fa-plus"></i> Nuevo Estilo
</button>
</div>
</div>
<div class="overflow-x-auto">
<table class="min-w-full bg-white border border-gray-200">
<thead>
<tr>
<th class="py-3 px-4 bg-gray-100 text-left text-xs font-medium text-gray-600 uppercase tracking-wider">ID Estilo</th>
<th class="py-3 px-4 bg-gray-100 text-left text-xs font-medium text-gray-600 uppercase tracking-wider">Nombre</th>
<th class="py-3 px-4 bg-gray-100 text-left text-xs font-medium text-gray-600 uppercase tracking-wider">Descripción</th>
<th class="py-3 px-4 bg-gray-100 text-center text-xs font-medium text-gray-600 uppercase tracking-wider">Acciones</th>
</tr>
</thead>
<tbody id="estilos-table-body" class="divide-y divide-gray-200">
<!-- Los estilos se cargarán dinámicamente -->
</tbody>
</table>
</div>
</div>
</div>
