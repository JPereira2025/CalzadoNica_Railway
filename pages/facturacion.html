<div id="facturacion-page" class="page hidden">
<div class="bg-white shadow-md rounded-lg mb-6 p-6">
<div class="flex flex-wrap justify-between items-center mb-6">
<h2 class="text-2xl font-bold text-gray-800">Nueva Factura</h2>
<div class="mt-4 md:mt-0">
<button id="btn-nueva-factura" class="bg-teal-600 hover:bg-teal-700 text-white py-2 px-4 rounded-lg transition-colors flex items-center gap-2">
<i class="fas fa-plus"></i> Nueva Factura
</button>
</div>
</div>

<form id="form-factura" class="space-y-6">
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
<div>
<label class="block text-gray-700 text-sm font-bold mb-2" for="factura-numero">N° Factura</label>
<input type="text" id="factura-numero" class="w-full px-3 py-2 border border-gray-300 rounded-md readonly-input" readonly>
</div>
<div>
<label class="block text-gray-700 text-sm font-bold mb-2" for="factura-fecha">Fecha y Hora</label>
<input type="text" id="factura-fecha" class="w-full px-3 py-2 border border-gray-300 rounded-md readonly-input" readonly>
</div>
<div>
<label class="block text-gray-700 text-sm font-bold mb-2" for="factura-cliente">Nombre del Cliente</label>
<input type="text" id="factura-cliente" placeholder="Nombre completo" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-teal-500" required>
</div>
<div>
<label class="block text-gray-700 text-sm font-bold mb-2" for="factura-vendedor">Vendedor</label>
<input type="text" id="factura-vendedor" class="w-full px-3 py-2 border border-gray-300 rounded-md readonly-input" readonly>
</div>
</div>
<div class="border-t pt-4">
<h3 class="text-lg font-semibold text-gray-800 mb-4">Agregar Productos</h3>
<div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
<div>
<label class="block text-gray-700 text-sm font-bold mb-2" for="factura-producto-select">Seleccionar Producto</label>
<select id="factura-producto-select" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-teal-500">
<option value="">-- Seleccione --</option>
</select>
</div>
<div>
<label class="block text-gray-700 text-sm font-bold mb-2" for="factura-cantidad">Cantidad</label>
<input type="number" id="factura-cantidad" min="1" value="1" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-teal-500">
</div>
<div class="flex items-end">
<button type="button" id="btn-agregar-producto-factura" class="w-full bg-blue-500 hover:bg-blue-600 text-white py-2 px-4 rounded-md transition-colors">
<i class="fas fa-plus"></i> Agregar
</button>
</div>
</div>
<table class="min-w-full bg-white border border-gray-200">
<thead class="bg-gray-50">
<tr>
<th class="py-2 px-4 text-left text-xs font-medium text-gray-600 uppercase tracking-wider">Producto</th>
<th class="py-2 px-4 text-left text-xs font-medium text-gray-600 uppercase tracking-wider">P. Unitario</th>
<th class="py-2 px-4 text-left text-xs font-medium text-gray-600 uppercase tracking-wider">Cantidad</th>
<th class="py-2 px-4 text-left text-xs font-medium text-gray-600 uppercase tracking-wider">Subtotal</th>
<th class="py-2 px-4 text-center text-xs font-medium text-gray-600 uppercase tracking-wider">Acciones</th>
</tr>
</thead>
<tbody id="factura-items-body" class="divide-y divide-gray-200"></tbody>
</table>
</div>
<div class="border-t pt-4">
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div>
<label class="block text-gray-700 text-sm font-bold mb-2" for="factura-descuento">Código de Descuento</label>
<div class="flex">
<input type="text" id="factura-descuento" placeholder="Ej: NAVIDAD23" class="flex-grow px-3 py-2 border border-gray-300 rounded-l-md focus:outline-none focus:ring-2 focus:ring-teal-500">
<button type="button" id="btn-aplicar-codigo" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-r-md transition-colors">
Aplicar
</button>
</div>
</div>
<div class="flex items-center">
<input type="checkbox" id="factura-iva" class="toggle-checkbox hidden" checked>
<label for="factura-iva" class="toggle-label relative block w-12 h-6 bg-gray-300 rounded-full cursor-pointer transition-colors">
<span class="toggle-dot absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition-transform"></span>
</label>
<label for="factura-iva" class="ml-3 text-gray-700 font-medium">Aplicar IVA (15%)</label>
</div>
</div>
</div>
<div class="border-t pt-4">
<div class="grid grid-cols-1 md:grid-cols-4 gap-4 text-right">
<div class="md:col-span-3"></div>
<div>
<p class="text-sm text-gray-600">Subtotal: <span id="factura-subtotal" class="font-semibold">C$0.00</span></p>
<p class="text-sm text-gray-600">Descuento: <span id="factura-monto-descuento" class="font-semibold text-red-600">-C$0.00</span></p>
<p class="text-sm text-gray-600">IVA (15%): <span id="factura-iva-monto" class="font-semibold">C$0.00</span></p>
<p class="text-lg font-bold text-gray-800 pt-2 border-t">Total: <span id="factura-total">C$0.00</span></p>
</div>
</div>
</div>
<div class="flex justify-end space-x-3">
<button type="button" id="btn-cancelar-factura" class="bg-gray-300 hover:bg-gray-400 text-gray-800 py-2 px-4 rounded-lg transition-colors">Cancelar</button>
<button type="submit" class="bg-teal-600 hover:bg-teal-700 text-white py-2 px-4 rounded-lg transition-colors">
<i class="fas fa-save"></i> Guardar Factura
</button>
</div>
</form>
</div>
<div class="bg-white shadow-md rounded-lg p-6 mt-6">
<h2 class="text-2xl font-bold text-gray-800">Facturas Guardadas</h2>
<div class="flex space-x-2 my-4" id="export-buttons-facturas">
<button class="btn-export bg-red-500 hover:bg-red-600 text-white py-2 px-3 rounded-lg transition-colors flex items-center gap-2" data-table-id="facturas-table-body" data-type="pdf" title="Exportar a PDF"><i class="fas fa-file-pdf"></i></button>
<button class="btn-print bg-gray-500 hover:bg-gray-600 text-white py-2 px-3 rounded-lg transition-colors flex items-center gap-2" data-table-id="facturas-table-body" title="Imprimir"><i class="fas fa-print"></i></button>
</div>
<div class="overflow-x-auto">
<table class="min-w-full bg-white border border-gray-200">
<thead>
<tr>
<th class="py-3 px-4 bg-gray-100 text-left text-xs font-medium text-gray-600 uppercase tracking-wider">N° Factura</th>
<th class="py-3 px-4 bg-gray-100 text-left text-xs font-medium text-gray-600 uppercase tracking-wider">Cliente</th>
<th class="py-3 px-4 bg-gray-100 text-left text-xs font-medium text-gray-600 uppercase tracking-wider">Fecha</th>
<th class="py-3 px-4 bg-gray-100 text-left text-xs font-medium text-gray-600 uppercase tracking-wider">Vendedor</th>
<th class="py-3 px-4 bg-gray-100 text-right text-xs font-medium text-gray-600 uppercase tracking-wider">Total</th>
<th class="py-3 px-4 bg-gray-100 text-center text-xs font-medium text-gray-600 uppercase tracking-wider">Acciones</th>
</tr>
</thead>
<tbody id="facturas-table-body" class="divide-y divide-gray-200"></tbody>
</table>
</div>
</div>
</div>
